services:
  - type: web
    name: ouroboros
    env: node
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && node src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ouroboros-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: ouroboros-db
    plan: free
